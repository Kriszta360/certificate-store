apiVersion: apps/v1
kind: Deployment
metadata:
  name: certificate-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: certificate-frontend
  template:
    metadata:
      labels:
        app: certificate-frontend
    spec:
      containers:
        - name: certificate-frontend
          image: ghcr.io/kriszta360/certificate-frontend:latest
          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: certificate-frontend
spec:
  type: NodePort
  selector:
    app: certificate-frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30007