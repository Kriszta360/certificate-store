apiVersion: apps/v1
kind: Deployment
metadata:
  name: certificate-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: certificate-mcp
  template:
    metadata:
      labels:
        app: certificate-mcp
    spec:
      containers:
        - name: certificate-mcp
          image: ghcr.io/kriszta360/certificate-mcp:latest
          ports:
            - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: certificate-mcp
spec:
  selector:
    app: certificate-mcp
  ports:
    - port: 8080
      targetPort: 8080